    <script>
        // Improved switchTab: accepts optional button element to mark active class
        function switchTab(tabName, btn) {
            // Hide all tabs
            const tabs = document.querySelectorAll('.tab-content');
            tabs.forEach(tab => tab.classList.remove('active'));

            // Remove active class from all buttons
            const buttons = document.querySelectorAll('.tab-btn');
            buttons.forEach(b => b.classList.remove('active'));

            // Show selected tab
            const el = document.getElementById(tabName);
            if (el) el.classList.add('active');

            // Add active class to clicked button (if provided)
            if (btn && btn.classList) {
              btn.classList.add('active');
            } else {
              const fallback = Array.from(buttons).find(b => b.textContent.trim().toLowerCase().includes(tabName));
              if (fallback) fallback.classList.add('active');
            }

            // When PCA tab is activated, try to resize iframe content in case it needs layout
            if (tabName === 'pca') {
                const iframe = document.getElementById('pca-iframe');
                if (iframe && iframe.contentWindow) {
                    // send a postMessage to the iframe to request a resize (enhanced viewer can listen for this if needed)
                    try {
                        iframe.contentWindow.postMessage({ type: 'resizeRequest' }, '*');
                    } catch(e) { /* ignore */ }
                }
                // Also ensure iframe is visible and user's browser will render it
                setTimeout(() => {
                    // scroll to iframe to ensure it's in view (optional)
                    iframe && iframe.scrollIntoView({ behavior: 'smooth', block: 'center' });
                }, 150);
            }
        }

        // If the user loads the page with a hash (e.g., #pca), open that tab
        (function openTabFromHash(){
            const hash = window.location.hash.replace('#','');
            if (!hash) return;
            const valid = ['roadmap','pca'];
            if (valid.includes(hash)) {
                const btn = Array.from(document.querySelectorAll('.tab-btn')).find(b => b.textContent.trim().toLowerCase().includes(hash));
                switchTab(hash, btn || null);
            }
        })();
    </script>
